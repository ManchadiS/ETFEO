<!-- Main View Area -->
<div class="layout-container full-width-layout">
  <header class="top-bar">
    <!-- Left: Brand Block -->
    <div class="header-main-brand">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="brand-logo" style="width: 44px; height: 44px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid var(--primary); padding: 0;">
          <img src="/logo.jpg" alt="Engineering Tadka Logo" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div>
          <h2 style="font-size: 1.25rem; font-weight: 800; color: #fff; margin: 0; letter-spacing: -0.5px; line-height: 1.1;">Engineering Tadka</h2>
          <span style="font-size: 9px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.8px;">Online Ordering</span>
        </div>
      </div>
    </div>
    
    <!-- Center: Outlet Selector (Direct child of top-bar for responsive wrapping) -->
    <div class="restaurant-selector">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width: 15px; height: 15px; color: var(--primary);">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
        <circle cx="12" cy="10" r="3"></circle>
      </svg>
      <select #selectEl id="activeRestaurant" class="restaurant-dropdown"
        (change)="onRestaurantChange(selectEl.value)" [value]="selectedRestaurantId()">
        <option *ngFor="let r of restaurants()" [value]="r.id">{{ r.name }}</option>
      </select>
    </div>
    
    <!-- Right: Badges & Checkout Trigger button -->
    <div class="header-actions">
      <!-- Diagnostics -->
      <div style="display: flex; align-items: center; gap: 8px;" class="hide-mobile">
        <span [title]="'DB Mode: ' + dbMode()" style="cursor: help; opacity: 0.65;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px; color: var(--primary);">
            <ellipse cx="12" cy="5" rx="9" ry="3" />
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
            <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3" />
          </svg>
        </span>
        <span [title]="'API Link: ' + (apiConnected() ? 'Online' : 'Offline')" style="cursor: help; opacity: 0.65;">
          <span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%;" [style.background]="apiConnected() ? '#10b981' : '#ef4444'"></span>
        </span>
      </div>

      <!-- Burger King Styled Basket Trigger -->
      <button type="button" class="btn-cart-trigger" (click)="toggleCart()" [disabled]="orderItems().length === 0">
        <!-- Shopping Bag Icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width: 18px; height: 18px;">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
        <span class="cart-label">Cart</span>
        
        <!-- Cart count badge -->
        <span *ngIf="cartItemsCount > 0" class="cart-count-badge">
          {{ cartItemsCount }}
        </span>
      </button>
    </div>
  </header>

  <!-- Page Viewport -->
  <main class="page-content animate-fade-in" style="padding: 24px 32px; max-width: 1500px; margin: 0 auto; width: 100%;">
    <router-outlet></router-outlet>
  </main>
</div>
